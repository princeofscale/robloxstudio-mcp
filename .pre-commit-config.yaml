# Lightweight repo hygiene, run by pre-commit.ci on pull requests.
# Generated/binary artifacts are excluded.
exclude: '\.(rbxmx|png)$|(^|/)package-lock\.json$|(^|/)out/|(^|/)dist/'

repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v6.0.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-json
      - id: check-merge-conflict
      - id: check-added-large-files
        args: ['--maxkb=1024']
